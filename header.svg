<svg width="900" height="210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.1" fill="rgba(255,255,255,0.11)"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#100603"/>
      <stop offset="55%" stop-color="#130705"/>
      <stop offset="100%" stop-color="#0A0301"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C67B3B" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#C67B3B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0A96A"/>
      <stop offset="100%" stop-color="#C67B3B"/>
    </linearGradient>
    <filter id="softglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="900" height="210" fill="url(#bg)"/>
  <!-- Dot matrix overlay -->
  <rect width="900" height="210" fill="url(#dots)"/>
  <!-- Warm left accent wash -->
  <rect width="480" height="210" fill="url(#accent)"/>

  <!-- Left border line -->
  <rect x="44" y="38" width="2.5" height="134" fill="#C67B3B" opacity="0.75"/>
  <!-- Small top tick -->
  <rect x="44" y="35" width="18" height="2" fill="#C67B3B" opacity="0.5"/>
  <!-- Small bottom tick -->
  <rect x="44" y="172" width="12" height="2" fill="#C67B3B" opacity="0.35"/>

  <!-- Main name -->
  <text x="60" y="102"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="54"
        fill="url(#namegrad)"
        font-weight="bold"
        filter="url(#softglow)">reiz_riz</text>

  <!-- Tagline -->
  <text x="63" y="136"
        font-family="'Courier New', Courier, monospace"
        font-size="12.5"
        fill="#C67B3B"
        letter-spacing="4.5">AI ENGINEER  ·  ETHICAL HACKER  ·  VIBE CODER</text>

  <!-- Sub-tagline -->
  <text x="63" y="162"
        font-family="'Courier New', Courier, monospace"
        font-size="10.5"
        fill="#7A4020"
        letter-spacing="2.5">Indonesia  ·  Self-Taught  ·  Built from Mobile</text>

  <!-- Decorative dot cluster - right -->
  <circle cx="700" cy="55" r="1.8" fill="#E8956D" opacity="0.4"/>
  <circle cx="730" cy="42" r="3.2" fill="#C67B3B" opacity="0.35"/>
  <circle cx="762" cy="68" r="5" fill="#C67B3B" opacity="0.18"/>
  <circle cx="798" cy="44" r="2.5" fill="#F0A96A" opacity="0.28"/>
  <circle cx="826" cy="75" r="4" fill="#C67B3B" opacity="0.22"/>
  <circle cx="855" cy="52" r="2" fill="white" opacity="0.12"/>
  <circle cx="872" cy="88" r="3" fill="#E8956D" opacity="0.2"/>

  <circle cx="718" cy="102" r="2.5" fill="#C67B3B" opacity="0.22"/>
  <circle cx="752" cy="115" r="4.5" fill="#C67B3B" opacity="0.15"/>
  <circle cx="788" cy="98" r="2" fill="white" opacity="0.1"/>
  <circle cx="818" cy="122" r="3.5" fill="#E8956D" opacity="0.2"/>
  <circle cx="848" cy="105" r="2.5" fill="#C67B3B" opacity="0.25"/>
  <circle cx="876" cy="118" r="1.5" fill="white" opacity="0.1"/>

  <circle cx="708" cy="148" r="3" fill="#C67B3B" opacity="0.18"/>
  <circle cx="745" cy="160" r="2" fill="#E8956D" opacity="0.22"/>
  <circle cx="775" cy="142" r="4" fill="#C67B3B" opacity="0.12"/>
  <circle cx="812" cy="155" r="2.5" fill="white" opacity="0.08"/>
  <circle cx="840" cy="145" r="3" fill="#E8956D" opacity="0.18"/>
  <circle cx="868" cy="158" r="2" fill="#C67B3B" opacity="0.2"/>

  <!-- Bottom rule line -->
  <rect x="60" y="180" width="40" height="1.2" fill="#C67B3B" opacity="0.35"/>
  <rect x="106" y="180" width="14" height="1.2" fill="#C67B3B" opacity="0.18"/>
</svg>
